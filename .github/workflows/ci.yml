name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features
      # build.rs regenerates include/u_insight.h via cbindgen on every check/build.
      # If the committed header drifted from the current #[repr(C)] FFI surface,
      # the working tree is dirty — fail so the stale C header (which the C#/C
      # bindings depend on) is regenerated and committed. Same drift class as the
      # JSON FFI schema guards.
      - name: Verify committed C header matches cbindgen output
        shell: bash
        run: |
          git diff --exit-code -- include/u_insight.h \
            || { echo "::error::include/u_insight.h is stale — run 'cargo build' and commit the regenerated header"; exit 1; }

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  wasm:
    name: WASM Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation ../../algorithms
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow
          git clone --depth 1 https://github.com/iyulab/u-analytics.git ../../algorithms/u-analytics
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib --target wasm32-unknown-unknown
